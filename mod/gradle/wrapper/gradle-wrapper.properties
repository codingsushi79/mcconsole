distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
# Gradle 8.10+ is required for Java 25 toolchain provisioning support,
# but fabric-loom 1.17.x (current as of 2026-07-19, see build.gradle)
# needs Gradle's plugin API version 9.5+, hence 9.6.1 here. Bump this
# further if a newer Gradle is out by the time you build — check
# https://gradle.org/releases/ since Loom + brand-new JDKs can lag a
# little behind Minecraft's own Java version bumps.
distributionUrl=https\://services.gradle.org/distributions/gradle-9.6.1-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
